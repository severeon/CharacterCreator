$schema: "https://json-schema.org/draft/2020-12/schema"

title: Template Entity Schema
description: Schema for template entities (classes, races) in content packs

type: object
properties:
  entity_header:
    $ref: _base.schema.yaml#/types/entity_header
  entity_type:
    type: string
    pattern: "^template(\\.[a-z_]+)?$"
  name:
    type: string
    description: Display name of the template
  hd:
    type: integer
    description: Hit Dice value for the class or creature type
  bab_progression:
    $ref: _base.schema.yaml#/types/bab_type
    description: Base attack bonus progression
  saves:
    type: object
    properties:
      fort:
        $ref: _base.schema.yaml#/types/save_progression
      ref:
        $ref: _base.schema.yaml#/types/save_progression
      will:
        $ref: _base.schema.yaml#/types/save_progression
    description: Saving throw progressions
  skill_points:
    type: integer
    description: Base skill points per level
  class_skills:
    type: array
    items:
      type: string
    description: Skills considered class skills for this template

required:
  - entity_header
  - name
